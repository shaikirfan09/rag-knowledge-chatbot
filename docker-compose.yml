version: "3.8"

services:

  qdrant:
    image: qdrant/qdrant:v1.7.3
    container_name: qdrant_db
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  chatbot:
    build: .
    container_name: ai_chatbot
    ports:
      - "8501:8501"
    depends_on:
      - qdrant

volumes:
  qdrant_storage: